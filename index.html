       Jarred Deep Sea         : #4482A3  text #FFF4ED
       Day Old Snow            : #FFE4D2  text #884529
       Olive Before Dinner     : #818546  text #FFE4D2
       Sky to a Bird           : #9BC0CC  text #4482A3
       Fresh Cut Wood (dark)   : #884529
    ─────────────────────────────────────────────────────────── */
    :root{
      --sunset:#E68A58; --sunset-lt:#FFF0E6; --sunset-dk:#C4703D;
      --ocean:#99B7A4;  --ocean-lt:#E8F0EC;  --ocean-dk:#5E8C78;
      --sea:#4482A3;    --sea-lt:#DBEAF5;    --sea-dk:#2A6280;
      --sky:#9BC0CC;    --sky-lt:#E8F4F8;
      --snow:#FFE4D2;
      --olive:#818546;  --olive-lt:#EFF0E0;
      --wood:#884529;   --wood-lt:#F5ECE6;
      --bg:#FFF8F0;
    }
    body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg)}
    .cal-day{min-height:74px;transition:transform .12s,box-shadow .12s;cursor:pointer}
    .cal-day:hover{transform:scale(1.04);box-shadow:0 2px 8px rgba(136,69,41,.12)}
    .slide-in{animation:si .18s ease-out}
    @keyframes si{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .modal-bg{backdrop-filter:blur(4px)}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:var(--sunset);border-radius:10px;opacity:.6}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--sunset)!important;box-shadow:0 0 0 3px rgba(230,138,88,.18)}
    .tab-on{background:var(--sunset);color:#FFF4ED;box-shadow:0 2px 8px rgba(230,138,88,.4)}
    .tab-off{background:white;color:var(--wood);border:1px solid var(--snow)}
    /* 영양 카드 상태 — 팔레트 매핑 */
    .s-ok  {--b:var(--ocean);  --bg:var(--ocean-lt);--c:var(--ocean-dk);--dim:#C8DDD6}
    .s-low {--b:var(--sunset); --bg:var(--sunset-lt);--c:var(--wood);   --dim:var(--snow)}
    .s-high{--b:var(--wood);   --bg:var(--wood-lt);  --c:var(--wood);   --dim:#E8D5C8}
    .s-na  {--b:#D8CEBC;      --bg:#FAF6F0;         --c:#9C8575;       --dim:#EDE5D8}
    .mcard{background:var(--bg);border:2px solid var(--b);border-radius:14px;padding:14px 16px;margin-bottom:10px}
    .mbadge{background:var(--dim);color:var(--c);font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px}
    .mtip{border-top:1px solid var(--b);color:var(--c);margin-top:8px;padding-top:8px;font-size:11px;line-height:1.5}
    /* 섹션 헤더 */
    .sec-title{font-size:13px;font-weight:800;color:var(--wood);display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:2px solid var(--snow);margin-bottom:12px}
    .sec-title::before{content:'';display:block;width:4px;height:16px;border-radius:2px;background:var(--sunset);flex-shrink:0}

// ── 미량영양소 계산 (섭취율 반영) ────────────────────────────────────────────────
function calcMicro(ingredients, ratio=1){
  const r={iron:0,zinc:0,calcium:0,vitA:0,vitC:0,vitD:0, missing:[]};
  ingredients.forEach(ing=>{
    const g=Number(ing.grams||0)*ratio;
    const m=MICRO_DB[ing.name]||(()=>{
      for(const[k,v]of Object.entries(MICRO_DB)){if(ing.name.includes(k)||k.includes(ing.name))return v;}
      return null;
    })();
    if(m&&g>0){r.iron+=m.iron*g/100;r.zinc+=m.zinc*g/100;r.calcium+=m.calcium*g/100;
               r.vitA+=m.vitA*g/100;r.vitC+=m.vitC*g/100;r.vitD+=m.vitD*g/100;}
    else if(!m&&ing.name)r.missing.push(ing.name);
  });
  return r;
}

function lookupM(name){
  if(MDB[name]) return MDB[name];
  for(const[k,v]of Object.entries(MDB)){if(name.includes(k)||k.includes(name))return v;}
  return null;
}

// ── 시판 제품 자유 텍스트 파서 (API 없이 클라이언트에서 정리) ──────────────────
// "나트륨112mg 탄수화물29g 지방2.9g 단백질5.9g, 쌀 쇠고기 무" 같은 자유 입력을
// 영양정보(탄·단·지·칼로리 등)와 원재료 목록으로 분해한다.
function parseCommercialText(text){
  const empty={kcal:0,carbs:0,protein:0,fat:0,satFat:0,sodium:0,sugar:0,servingSize:0,ingredients:[],hasNutrition:false};
  if(!text||!text.trim())return empty;
  const t=text.replace(/그램|그람/g,'g');
  const grab=re=>{const m=t.match(re);return m?parseFloat(m[1]):0;};
  // 포화지방을 먼저 따로 빼서 '지방'과 충돌 방지
  const satFat=grab(/포화지방\s*[:=]?\s*([\d.]+)/);
  const tNoSat=t.replace(/포화지방\s*[:=]?\s*[\d.]+\s*g?/g,' ').replace(/트랜스지방\s*[:=]?\s*[\d.]+\s*g?/g,' ');
  const fat=(()=>{const m=tNoSat.match(/지방\s*[:=]?\s*([\d.]+)/);return m?parseFloat(m[1]):0;})();
  const carbs=grab(/탄수화물\s*[:=]?\s*([\d.]+)/);
  const protein=grab(/단백질\s*[:=]?\s*([\d.]+)/);
  const sugar=grab(/당류\s*[:=]?\s*([\d.]+)/);
  const sodium=grab(/나트륨\s*[:=]?\s*([\d.]+)/);
  let kcal=grab(/(?:열량|칼로리|에너지)\s*[:=]?\s*([\d.]+)/);
  if(!kcal){const m=t.match(/([\d.]+)\s*kcal/i);if(m)kcal=parseFloat(m[1]);}
  const servingSize=grab(/(?:1회\s*제공량|제공량|총\s*내용량|총내용량|중량)\s*[:=]?\s*([\d.]+)\s*g/);
  // 원재료: 영양 토큰을 제거하고 남은 텍스트를 분리
  let ing=text.replace(/그램|그람/g,'g')
    .replace(/(열량|칼로리|에너지|나트륨|탄수화물|당류|식이섬유|포화지방|트랜스지방|지방|단백질|콜레스테롤|1회\s*제공량|제공량|총\s*내용량|총내용량|중량)\s*[:=]?\s*[\d.]+\s*(kcal|mg|g|%)?/g,' ')
    .replace(/[\d.]+\s*(kcal|mg|g|%)/gi,' ')
    .replace(/[\d.]+%?/g,' ')
    .replace(/포함|원재료명?|함유|기타|및|입니다|이상/g,' ');
  const ingredients=[...new Set(
    ing.split(/[,，、·・/\s]+/).map(s=>s.trim())
      .filter(s=>s&&(/[가-힣]/.test(s)||/[A-Za-z]{2,}/.test(s)))
  )];
  return{kcal,carbs,protein,fat,satFat,sodium,sugar,servingSize,ingredients,
    hasNutrition:!!(kcal||carbs||protein||fat)};
}

// ── 영양 계산 (식단별 섭취율 적용) ──────────────────────────────────────────────
// 각 meal에 totalMadeGrams·totalEatenGrams가 있으면 비율 적용, 없으면 100%
function calcMacros(meals){
  let cG=0,pG=0,fG=0,kcalSum=0,miss=[];
  meals.forEach(meal=>{
    // 시판 + 스캔된 영양정보 있으면 직접 사용
    if(meal.isCommercial&&meal.commercialNutrition){
      const cn=meal.commercialNutrition;
      const serving=cn.servingSize>0?cn.servingSize:100;
      const eaten=meal.totalEatenGrams>0?meal.totalEatenGrams:serving;
      const r=eaten/serving;
      cG+=(cn.carbs||0)*r; pG+=(cn.protein||0)*r; fG+=(cn.fat||0)*r;
      kcalSum+=(cn.kcal||0)*r;
      return;
    }
    const ingSum=meal.ingredients.reduce((s,i)=>s+Number(i.grams||0),0);
    const made=meal.totalMadeGrams>0?meal.totalMadeGrams:ingSum;
    const eaten=meal.totalEatenGrams>0?meal.totalEatenGrams:made;
    const ratio=made>0?eaten/made:1;
    meal.ingredients.forEach(ing=>{
      const g=Number(ing.grams||0)*ratio;
      const m=lookupM(ing.name);
      if(m&&g>0){cG+=m.c*g/100;pG+=m.p*g/100;fG+=m.f*g/100;}
      else if(!m&&ing.name) miss.push(ing.name);
    });
  });
  const cK=cG*4,pK=pG*4,fK=fG*9;
  const tot=kcalSum>0?kcalSum:(cK+pK+fK);
  const base=cK+pK+fK;
  return{carbsG:cG,proteinG:pG,fatG:fG,
    carbsKcal:cK,proteinKcal:pK,fatKcal:fK,totalKcal:tot,
    carbsPct:  base>0?cK/base*100:0,
    proteinPct:base>0?pK/base*100:0,
    fatPct:    base>0?fK/base*100:0,
    missing:[...new Set(miss)]};
}

  const d=Math.floor((new Date()-new Date(b))/86400000);
  if(lang==='en'){
    if(d<30)return`${d} days old`;
    if(d<365)return`${Math.floor(d/30)}m ${d%30}d old`;
    return`${Math.floor(d/365)}y ${Math.floor((d%365)/30)}m old`;
  }

}
function useLS(key,init){
  const[v,sv]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}});
  useEffect(()=>{localStorage.setItem(key,JSON.stringify(v));},[key,v]);
  return[v,sv];
}

// 개월수 기준 도입 가능 여부 — 농촌진흥청·식약처·대한소아과학회 기준
function isAgeOk(name, months){
  const m=MICRO_DB[name];
  if(!m?.intro) return months>=6; // DB 없으면 이유식 시작 기준 6개월 적용
  const match=m.intro.match(/(\d+)개월/);
  if(!match) return true;
  return months>=parseInt(match[1]);
}

  const E=lang==='en';

  const allLiked=[...new Set([...liked,...fromLikedMeals])];

  const tried=new Set();
  Object.values(meals).forEach(dm=>dm.forEach(m=>m.ingredients.forEach(i=>tried.add(i.name))));

  const recs=[];
  Object.entries(IDB).forEach(([cat,items])=>{
    const un=items.filter(i=>!tried.has(i)&&!allergy.includes(i)&&ageOk(i));
    const li=items.filter(i=>allLiked.includes(i));
    if(li.length>0&&un.length>0){
      const pick=un[Math.floor(Math.random()*un.length)];
      recs.push({id:genId(),cat,
        title:E?`${li[0]} + ${cat}`:`${li[0]}와 어울리는 ${cat}`,
        desc:E?`"${pick}" — pairs well with ${li[0]}!`:`"${pick}" — ${li[0]}와 함께 먹으면 좋아요!`,
        type:'pair',color:'#EFF0E0',tc:'#818546'});
    }
    if(un.length>0){
      recs.push({id:genId(),cat,
        title:E?`Try new: ${cat}`:`${cat} 새 도전`,
        desc:un.slice(0,2).map(p=>`"${p}"`).join(', ')+(E?' — not tried yet':' 아직 안 먹어봤어요'),
        type:'new',color:'#E8F0EC',tc:'#5E8C78'});
    }
  });
  if(allLiked.length>=2){
    const combo=allLiked.slice(0,3);
    recs.push({id:genId(),cat:E?'Combo':'조합',
      title:E?'Favourite combo':'좋아하는 재료 모음',
      desc:combo.join(' + ')+(E?' — how about a bowl?':' 한 그릇 어떨까요?'),
      type:'combo',color:'#FFF0E6',tc:'#C4703D'});
  }
  const triedProtein=IDB.단백질.filter(i=>tried.has(i));
  if(triedProtein.length<2){
    const suggest=IDB.단백질.filter(i=>!tried.has(i)&&!allergy.includes(i)&&ageOk(i)).slice(0,2);
    if(suggest.length>0) recs.push({id:genId(),cat:E?'Nutrition':'영양보완',
      title:E?'Protein boost':'단백질 보충 추천',
      desc:suggest.map(s=>`"${s}"`).join(', ')+(E?' — for a balanced meal':' — 균형 잡힌 이유식을 위해 시도해보세요'),
      type:'nutrition',color:'#DBEAF5',tc:'#4482A3'});
  }
  return recs.sort(()=>Math.random()-.5).slice(0,7);
}

function MacroBar({actual, rec, color}){
  const W=300,H=42;
  const px=v=>v/100*W;
  const a=Math.min(actual,100);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{maxHeight:42}}>
      {/* 배경 트랙 */}
      <rect x={0} y={10} width={W} height={14} rx={7} fill="#F3F4F6"/>
      {/* 권장 범위 강조 */}
      <rect x={px(rec.min)} y={10} width={px(rec.max-rec.min)} height={14} rx={3} fill={color} opacity={0.28}/>
      {/* 실제값 바 */}
      {a>0&&<rect x={0} y={10} width={px(a)} height={14} rx={7} fill={color} opacity={0.88}/>}
      {/* 권장 범위 경계선 */}
      <line x1={px(rec.min)} y1={7} x2={px(rec.min)} y2={26} stroke="#4B5563" strokeWidth={1.5} opacity={0.45}/>
      <line x1={px(rec.max)} y1={7} x2={px(rec.max)} y2={26} stroke="#4B5563" strokeWidth={1.5} opacity={0.45}/>
      {/* 권장 범위 레이블 */}
      <text x={px(rec.min)} y={6} textAnchor="middle" fill="#6B7280" fontSize={8}>{rec.min}%</text>
      <text x={px(rec.max)} y={6} textAnchor="middle" fill="#6B7280" fontSize={8}>{rec.max}%</text>
      {/* 실제값 레이블 (바 위) */}
      {a>8&&<text x={Math.min(px(a)-4,W-16)} y={20} textAnchor="end"
        dominantBaseline="middle" fill="white" fontSize={9} fontWeight="bold">{Math.round(actual)}%</text>}
      {/* 눈금 */}
      {[0,25,50,75,100].map(v=>(
        <g key={v}>
          <line x1={px(v)} y1={25} x2={px(v)} y2={30} stroke="#D1D5DB" strokeWidth={1}/>
          <text x={px(v)} y={40} textAnchor="middle" fill="#9CA3AF" fontSize={8}>{v}</text>
        </g>
      ))}
    </svg>
  );
}

// ── 도넛 차트 ─────────────────────────────────────────────────────────────────
function Donut({macros,size=160,lang='ko'}){
  const{carbsPct,proteinPct,fatPct,totalKcal}=macros;
  if(totalKcal<1)return(
    <div style={{width:size,height:size}} className="flex items-center justify-center rounded-full bg-gray-50">
      <span className="text-xs text-gray-300">{lang==='en'?'No data':'기록 없음'}</span>
    </div>);
  const cx=size/2,cy=size/2,r=size/2-12,ir=r*.52;
  const sl=[{k:'carbs',p:carbsPct,c:MC.carbs},{k:'protein',p:proteinPct,c:MC.protein},{k:'fat',p:fatPct,c:MC.fat}].filter(s=>s.p>.3);
  let cum=-Math.PI/2;
  const paths=sl.map(s=>{
    const a=(s.p/100)*2*Math.PI,x1=cx+r*Math.cos(cum),y1=cy+r*Math.sin(cum);
    cum+=a;
    const mid=cum-a/2;
    return{...s,path:`M${cx} ${cy}L${x1} ${y1}A${r} ${r} 0 ${a>Math.PI?1:0} 1 ${cx+r*Math.cos(cum)} ${cy+r*Math.sin(cum)}Z`,
      lx:cx+(r*.68)*Math.cos(mid),ly:cy+(r*.68)*Math.sin(mid),pct:Math.round(s.p)};
  });
  return(
    <svg width={size} height={size}>
      {paths.map((s,i)=><path key={i} d={s.path} fill={s.c} stroke="white" strokeWidth={2.5}/>)}
      <circle cx={cx} cy={cy} r={ir} fill="white"/>
      <text x={cx} y={cy-6} textAnchor="middle" fill="#1F2937" fontSize={13} fontWeight="800">{Math.round(totalKcal)}</text>
      <text x={cx} y={cy+8} textAnchor="middle" fill="#9CA3AF" fontSize={9}>kcal</text>
      {paths.map((s,i)=>s.pct>7&&<text key={i} x={s.lx} y={s.ly} textAnchor="middle"
        dominantBaseline="middle" fill="white" fontSize={9} fontWeight="700">{s.pct}%</text>)}
    </svg>
  );
}

// ── 월별 스택바 ────────────────────────────────────────────────────────────────
function StackBar({meals,year,month}){
  const days=getDays(year,month),W=580,H=160,pL=30,pB=26,pT=10,pR=8;
  const cW=W-pL-pR,cH=H-pB-pT,bW=Math.max(4,cW/days-2.5);
  const data=useMemo(()=>Array.from({length:days},(_,i)=>{
    const day=i+1,k=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    return{d:day,...calcMacros(meals[k]||[])};
  }),[meals,year,month]);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{maxHeight:160}}>
      {[0,25,50,75,100].map(y=>{
        const yy=pT+cH*(1-y/100);
        return<g key={y}><line x1={pL} y1={yy} x2={W-pR} y2={yy} stroke="#F3F4F6" strokeWidth={1}/>
          <text x={pL-4} y={yy} textAnchor="end" dominantBaseline="middle" fill="#D1D5DB" fontSize={8}>{y}</text></g>;
      })}
      {data.map(({d,carbsPct:cp,proteinPct:pp,fatPct:fp,totalKcal:tk})=>{
        if(tk<.5)return null;
        const x=pL+(d-1)*(cW/days)+1,fH=cH*(fp/100),pH=cH*(pp/100),cHv=cH*(cp/100);
        return<g key={d}>
          <rect x={x} y={pT+cH-fH} width={bW} height={fH} fill={MC.fat} rx={1.5}/>
          <rect x={x} y={pT+cH-fH-pH} width={bW} height={pH} fill={MC.protein} rx={1.5}/>
          <rect x={x} y={pT+cH-fH-pH-cHv} width={bW} height={cHv} fill={MC.carbs} rx={1.5}/>
        </g>;
      })}
      {[1,5,10,15,20,25,days].map(d=>(
        <text key={d} x={pL+(d-1)*(cW/days)+bW/2} y={H-pB+12} textAnchor="middle" fill="#9CA3AF" fontSize={8}>{d}</text>
      ))}
    </svg>
  );
}

// ── 월별 kcal 꺾은선 ──────────────────────────────────────────────────────────
function KcalLine({meals,year,month}){
  const days=getDays(year,month),W=580,H=130,pL=36,pB=26,pT=10,pR=8;
  const cW=W-pL-pR,cH=H-pB-pT;
  const vals=useMemo(()=>Array.from({length:days},(_,i)=>{
    const k=`${year}-${String(month+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`;
    return calcMacros(meals[k]||[]).totalKcal;
  }),[meals,year,month]);
  const mx=Math.max(...vals,1);
  const pts=vals.map((k,i)=>[pL+i*(cW/(days-1||1)),pT+cH*(1-k/mx)]);
  const path='M'+pts.map(p=>p.join(',')).join('L');
  const area='M'+pL+' '+(pT+cH)+' '+pts.map(p=>p.join(',')).join('L')+' L'+pts[pts.length-1][0]+' '+(pT+cH)+'Z';
  return(
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{maxHeight:130}}>
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#E68A58" stopOpacity={.3}/><stop offset="100%" stopColor="#E68A58" stopOpacity={0}/>
      </linearGradient></defs>
      {[0,Math.round(mx/2),Math.round(mx)].map(y=>{
        const yy=pT+cH*(1-y/mx);
        return<g key={y}><line x1={pL} y1={yy} x2={W-pR} y2={yy} stroke="#F3F4F6" strokeWidth={1}/>
          <text x={pL-4} y={yy} textAnchor="end" dominantBaseline="middle" fill="#D1D5DB" fontSize={8}>{y}</text></g>;
      })}
      <path d={area} fill="url(#ag)"/>
      <path d={path} fill="none" stroke="#E68A58" strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
      {pts.map(([x,y],i)=>vals[i]>0&&<circle key={i} cx={x} cy={y} r={2.5} fill="#E68A58" stroke="white" strokeWidth={1.5}/>)}
      {[1,5,10,15,20,25,days].map(d=>(
        <text key={d} x={pL+(d-1)*(cW/(days-1||1))} y={H-pB+12} textAnchor="middle" fill="#9CA3AF" fontSize={8}>{d}</text>
      ))}
    </svg>
  );
}

                    {['stack','kcal'].map(m=>(
                      <button key={m} onClick={()=>setChartMode(m)}
                        className={`text-xs px-3 py-1 rounded-full transition-all ${chartMode===m?(m==='stack'?'text-white bg-[#4482A3]':'text-white bg-[#E68A58]'):'border border-gray-200 text-gray-500'}`}>
                        {m==='stack'?t(lang,'stackChart'):t(lang,'kcalChart')}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="bg-gray-50 rounded-xl p-3">
                  {chartMode==='stack'?(
                    <>
                      <div className="flex gap-3 mb-2 flex-wrap">
                        {['carbs','protein','fat'].map(k=>(
                          <span key={k} className="flex items-center gap-1 text-xs text-gray-500">
                            <span className="w-3 h-2.5 rounded-sm" style={{background:MC[k]}}/>
                            {ML[k]}
                          </span>
                        ))}
                        <span className="text-xs text-gray-400 ml-auto">{lang==='en'?'Y-axis: energy ratio (%)':'세로축: 에너지 비율(%)'}</span>
                      </div>
                      <StackBar meals={meals} year={year} month={month}/>
                    </>
                  ):(
                    <>
                      <div className="text-xs text-gray-400 mb-2">{lang==='en'?'Y-axis: daily estimated energy (kcal)':'세로축: 일별 총 추정 에너지(kcal)'}</div>
                      <KcalLine meals={meals} year={year} month={month}/>
                    </>
                  )}
                </div>
              </div>
              {monthM.missing.length>0&&(
                <div className="mt-3 text-xs text-[#C4703D] bg-[#FFF0E6] rounded-xl px-3 py-2">
                  ⚠️ {t(lang,'monthlyMissingDB')} ({monthM.missing.length}): {monthM.missing.join(', ')}
                </div>
              )}
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// 캘린더
// ══════════════════════════════════════════════════════════════════════════════
function CalView({meals,selectedDate,setSelectedDate,currentMonth,setCurrentMonth,birthDate,lang}){
  const year=currentMonth.getFullYear(),month=currentMonth.getMonth();
  const dIM=getDays(year,month),fD=getFirst(year,month);
  const cells=[...Array(fD).fill(null),...Array.from({length:dIM},(_,i)=>i+1)];
  const goToday=()=>{setSelectedDate(today());setCurrentMonth(new Date());};
  const isThisMonth=year===new Date().getFullYear()&&month===new Date().getMonth();
  const monthLabel=lang==='en'
    ?`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][month]} ${year}`
    :`${year}년 ${month+1}월`;
  return(
    <div className="bg-white rounded-2xl shadow-sm p-4">
      <div className="flex items-center justify-between mb-4">
        <button onClick={()=>setCurrentMonth(new Date(year,month-1,1))}
          className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-[#FFF0E6] text-gray-400">‹</button>
        <div className="flex items-center gap-2">
          <h2 className="text-base font-bold text-gray-800">{monthLabel}</h2>
          <button onClick={goToday}
            className="text-xs px-2.5 py-1 rounded-full font-semibold border transition-all"
            style={isThisMonth&&selectedDate===today()
              ?{borderColor:'#D1D5DB',color:'#9CA3AF',background:'white'}
              :{borderColor:'#E68A58',color:'#E68A58',background:'#FFF8F0'}}>
            {t(lang,'today')}
          </button>
        </div>
        <button onClick={()=>setCurrentMonth(new Date(year,month+1,1))}
          className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-[#FFF0E6] text-gray-400">›</button>
      </div>
      <div className="grid grid-cols-7 mb-1">
        {t(lang,'dow').map((d,i)=>(
          <div key={d} className={`text-center text-xs font-semibold py-1.5 ${i===0?'text-[#884529]':i===6?'text-[#4482A3]':'text-gray-400'}`}>{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {cells.map((day,i)=>{
          if(!day)return<div key={`e${i}`}/>;
          const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const dm=meals[ds]||[];
          const isTd=ds===today(),isSel=ds===selectedDate,dow=(fD+day-1)%7;
          let ntC=null;
          if(dm.length>0){
            const mac=calcMacros(dm);
            if(mac.totalKcal>0){
              const r=getRec(birthDate);let iss=0;
              if(mac.carbsPct<r.carbs.min||mac.carbsPct>r.carbs.max)iss++;
              if(mac.proteinPct<r.protein.min||mac.proteinPct>r.protein.max)iss++;
              if(mac.fatPct<r.fat.min||mac.fatPct>r.fat.max)iss++;
              ntC=iss===0?'#99B7A4':iss===1?'#E68A58':'#884529';
            }
          }
          const mTypes=MEAL_TYPES.filter(t=>dm.some(m=>m.type===t));
          return(
            <div key={day} onClick={()=>setSelectedDate(ds)}
              className={`cal-day rounded-xl p-1 select-none border-2 ${isSel?'border-[#E68A58] bg-[#FFF0E6]':isTd?'border-[#99B7A4] bg-[#E8F0EC]':'border-transparent hover:border-[#FFE4D2] hover:bg-[#FFF8F0]'}`}>
              <div className={`text-xs font-bold text-center ${dow===0?'text-[#884529]':dow===6?'text-[#4482A3]':isTd?'text-[#E68A58]':'text-gray-700'}`}>{day}</div>
              {mTypes.length>0&&(
                <div className="flex flex-wrap gap-0.5 justify-center mt-0.5">
                  {mTypes.map(tp=>(
                    <span key={tp} className="font-bold rounded leading-none"
                      style={{fontSize:8,padding:'1.5px 3px',background:MEAL_BG[tp],color:MEAL_FG[tp]}}>
                      {mealFirst(tp,lang)}
                    </span>
                  ))}
                </div>
              )}
              {ntC&&<div className="flex justify-center mt-0.5">
                <span className="w-2 h-2 rounded-full block" style={{background:ntC}}/>
              </div>}
            </div>
          );
        })}
      </div>
      <div className="mt-3 flex flex-wrap gap-x-3 gap-y-1.5 border-t pt-3 text-xs text-gray-400">
        {MEAL_TYPES.map(tp=>(
          <span key={tp} className="flex items-center gap-1">
            <span className="font-bold rounded" style={{fontSize:8,padding:'1px 3px',background:MEAL_BG[tp],color:MEAL_FG[tp]}}>{mealFirst(tp,lang)}</span>{mealLabel(tp,lang)}
          </span>
        ))}
        <span className="flex items-center gap-1 ml-2"><span className="w-2 h-2 rounded-full" style={{background:'#99B7A4'}}/>{lang==='en'?'Balanced':'균형 적정'}</span>
        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full" style={{background:'#E68A58'}}/>{lang==='en'?'Adjust':'조정 필요'}</span>
        <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full" style={{background:'#884529'}}/>{lang==='en'?'Unbalanced':'불균형'}</span>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// 식사 기록 모달 (식단 단위 제조량·섭취량)
// ══════════════════════════════════════════════════════════════════════════════
function MealModal({editMeal,onSave,onClose,allergy,selectedDate,lang='ko'}){
  const[type,setType]=useState(editMeal?.type||'아침');
  const[date,setDate]=useState(selectedDate);
  const[time,setTime]=useState(editMeal?.time||'08:00');
  const[memo,setMemo]=useState(editMeal?.memo||'');
  const[liked,setLiked]=useState(editMeal?.liked||false);
  const[isCommercial,setIsCommercial]=useState(editMeal?.isCommercial||false);
  const defaultIngs=()=>{
    if(editMeal?.ingredients?.length) return editMeal.ingredients.map(i=>({...i,grams:String(i.grams??'')}));
    return [{id:genId(),name:'',grams:''},{id:genId(),name:'',grams:''},{id:genId(),name:'',grams:''}];
  };
  const[ings,setIngs]=useState(defaultIngs);
  const[totalMade,setTotalMade]=useState(String(editMeal?.totalMadeGrams||''));
  const[totalEaten,setTotalEaten]=useState(String(editMeal?.totalEatenGrams||''));

  // 시판 영양/원재료 자유 입력 (사진 스캔 없이 텍스트 한 칸 → 자동 파싱)
  const[commText,setCommText]=useState(editMeal?.commercialText||'');
  const commParsed=React.useMemo(()=>parseCommercialText(commText),[commText]);

  const addIng=()=>setIngs(p=>[...p,{id:genId(),name:'',grams:''}]);
  const remIng=id=>setIngs(p=>p.filter(i=>i.id!==id));
  const updIng=(id,f,v)=>setIngs(p=>p.map(i=>i.id===id?{...i,[f]:v}:i));

  const ingSum=ings.reduce((s,i)=>s+(Number(i.grams)||0),0);
  const autoFillMade=()=>setTotalMade(String(ingSum));
  const fullMeal=()=>setTotalEaten(totalMade||String(ingSum));
  const madeN=Number(totalMade)||0;
  const eatenN=Number(totalEaten)||0;
  const eatPct=madeN>0?Math.round(eatenN/madeN*100):null;

  const handleSave=()=>{
    const v=ings.filter(i=>i.name.trim());
    if(!v.length){alert(lang==='en'?(isCommercial?'Enter the product name.':'Enter at least one ingredient.'):(isCommercial?'제품명을 입력해주세요.':'재료를 1개 이상 입력해주세요.'));return;}
    if(isCommercial){
      const p=commParsed;
      const cn=p.hasNutrition
        ?{kcal:p.kcal||0,carbs:p.carbs||0,protein:p.protein||0,fat:p.fat||0,
          satFat:p.satFat||0,sodium:p.sodium||0,sugar:p.sugar||0,servingSize:p.servingSize||0}
        :null;
      onSave({
        id:editMeal?.id||genId(),type,time,memo,liked,isCommercial:true,
        commercialNutrition:cn,
        commercialText:commText,
        commercialIngredients:p.ingredients,
        totalMadeGrams:0,totalEatenGrams:0,
        ingredients:v.map(i=>({id:i.id,name:i.name.trim(),grams:0,isCommercial:true}))
      }, date);
      return;
    }
    onSave({
      id:editMeal?.id||genId(),type,time,memo,liked,isCommercial:false,
      commercialNutrition:null,commercialText:'',commercialIngredients:[],
      totalMadeGrams:madeN,totalEatenGrams:eatenN||madeN,
      ingredients:v.map(i=>({id:i.id,name:i.name.trim(),grams:Number(i.grams)||0,isCommercial:false}))
    }, date);
  };

  return(
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-bg" style={{background:'rgba(0,0,0,0.45)'}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[92vh] overflow-y-auto slide-in">
        <div className="p-5">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-bold text-gray-800 text-lg">{editMeal?t(lang,'mealEdit'):t(lang,'mealRecord')}</h3>
            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 text-xl">×</button>
          </div>
          <div className="space-y-4">

            {/* 날짜 */}
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1.5">{t(lang,'mealDate')}</label>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)}
                className="border border-gray-200 rounded-xl px-3 py-2 w-full text-sm"/>
            </div>

            {/* 식사 종류 */}
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1">{t(lang,'mealTypeLabel')}</label>
              {/* D안: 밑줄 탭 */}
              <div style={{display:'flex',borderBottom:'1.5px solid #F3F4F6',marginBottom:8}}>
                {MEAL_TYPES.map(tp=>(
                  <button key={tp} onClick={()=>setType(tp)}
                    className="flex-1 py-2 text-xs font-bold transition-all"
                    style={{color:type===tp?MEAL_FG[tp]:'#9CA3AF',marginBottom:-1,background:'none',border:'none',borderBottom:type===tp?`2.5px solid ${MEAL_FG[tp]}`:'2.5px solid transparent'}}>
                    <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:type===tp?MEAL_FG[tp]:'#D1D5DB',marginRight:4,verticalAlign:'middle'}}/>
                    {mealLabel(tp,lang)}
                  </button>
                ))}
              </div>
              {/* 좋아하는 식단 / 시판: 동일 스타일 */}
              <div style={{display:'flex',borderBottom:'1.5px solid #F3F4F6'}}>
                <button onClick={()=>setLiked(v=>!v)}
                  className="flex-1 py-2 text-xs font-bold transition-all"
                  style={{color:liked?'#C4703D':'#9CA3AF',marginBottom:-1,background:'none',border:'none',borderBottom:liked?'2.5px solid #E68A58':'2.5px solid transparent'}}>
                  <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:liked?'#E68A58':'#D1D5DB',marginRight:4,verticalAlign:'middle'}}/>
                  {t(lang,'likedMeal')}
                </button>
                <button onClick={()=>setIsCommercial(v=>!v)}
                  className="flex-1 py-2 text-xs font-bold transition-all"
                  style={{color:isCommercial?'#2A6280':'#9CA3AF',marginBottom:-1,background:'none',border:'none',borderBottom:isCommercial?'2.5px solid #4482A3':'2.5px solid transparent'}}>
                  <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:isCommercial?'#4482A3':'#D1D5DB',marginRight:4,verticalAlign:'middle'}}/>
                  {t(lang,'commercialTag')}
                </button>
              </div>
            </div>

            {/* 시간 */}
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1.5">{t(lang,'mealTime')}</label>
              <input type="time" value={time} onChange={e=>setTime(e.target.value)}
                className="border border-gray-200 rounded-xl px-3 py-2 w-full text-sm"/>
            </div>

            {/* ─── 시판 영양·원재료 자유 입력 ─── */}
            {isCommercial&&(
              <div className="bg-[#E8F4F8] border border-[#9BC0CC] rounded-xl p-3 space-y-3">
                <div className="font-semibold text-xs text-[#2A6280]">{t(lang,'commTitle')}</div>
                <p className="text-xs text-[#4482A3]">{t(lang,'commHint')}</p>

                <textarea value={commText} onChange={e=>setCommText(e.target.value)}
                  rows={3} placeholder={t(lang,'commPlaceholder')}
                  className="w-full border border-[#9BC0CC] rounded-xl px-3 py-2 text-sm bg-white resize-none"/>

                {/* 자동 인식 결과 미리보기 */}
                {(commParsed.hasNutrition||commParsed.ingredients.length>0)?(
                  <div className="space-y-2.5 border-t border-[#9BC0CC] pt-2.5">
                    {commParsed.hasNutrition&&(
                      <div>
                        <div className="text-xs font-semibold text-gray-500 mb-1">{t(lang,'commParsedNutri')}</div>
                        <div className="flex flex-wrap gap-1.5">
                          {[
                            ['kcal',commParsed.kcal,'kcal'],
                            [t(lang,'macros').carbs,commParsed.carbs,'g'],
                            [t(lang,'macros').protein,commParsed.protein,'g'],
                            [t(lang,'macros').fat,commParsed.fat,'g'],
                            [lang==='en'?'sat.fat':'포화지방',commParsed.satFat,'g'],
                            [lang==='en'?'sugar':'당류',commParsed.sugar,'g'],
                            [lang==='en'?'sodium':'나트륨',commParsed.sodium,'mg'],
                            [t(lang,'commServing'),commParsed.servingSize,'g'],
                          ].filter(([,v])=>v>0).map(([lbl,v,u])=>(
                            <span key={lbl} className="text-xs bg-white border border-[#9BC0CC] text-[#2A6280] px-2 py-1 rounded-lg">
                              {lbl} <b>{v}{u}</b>
                            </span>
                          ))}
                        </div>
                      </div>
                    )}
                    {commParsed.ingredients.length>0&&(
                      <div>
                        <div className="text-xs font-semibold text-gray-500 mb-1">{t(lang,'commParsedIng')} ({commParsed.ingredients.length})</div>
                        <div className="flex flex-wrap gap-1">
                          {commParsed.ingredients.map((nm,i)=>(
                            <span key={i} className="text-xs bg-[#DBEAF5] text-[#2A6280] px-2 py-0.5 rounded-full">{nm}</span>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                ):commText.trim()?(
                  <p className="text-xs text-[#4482A3] opacity-70">{t(lang,'commNothing')}</p>
                ):null}
              </div>
            )}

            {/* 재료 목록 (홈메이드 또는 시판 제품명) */}
            <div>
              <div className="flex items-center justify-between mb-1.5">
                <label className="text-xs font-semibold text-gray-500">
                  {isCommercial?(lang==='en'?'Product name':'제품명'):t(lang,'ingsLabel')}
                </label>
                <button onClick={addIng} className="text-xs text-[#E68A58] font-semibold">{t(lang,'addIng')}</button>
              </div>
              <div className="space-y-1.5">
                {ings.map(ing=>(
                  <div key={ing.id} className="flex gap-1.5 items-center">
                    <input type="text" placeholder={isCommercial?(lang==='en'?'Product name (e.g. Heinz apple purée)':'제품명 (예: 하인즈 사과퓨레)'):(lang==='en'?'Ingredient (e.g. carrot)':'재료명 (예: 당근)')} value={ing.name}
                      onChange={e=>updIng(ing.id,'name',e.target.value)}
                      className={`flex-1 border rounded-xl px-2.5 py-2 text-sm ${allergy.includes(ing.name)?'border-red-300 bg-red-50':isCommercial?'border-[#9BC0CC] bg-[#E8F4F8]':'border-gray-200'}`}/>
                    {!isCommercial&&<input type="number" placeholder="g" value={ing.grams}
                      onChange={e=>updIng(ing.id,'grams',e.target.value)}
                      className="w-20 border border-gray-200 rounded-xl px-2 py-2 text-sm text-center" min="0"/>}
                    {!isCommercial&&!lookupM(ing.name)&&ing.name&&<span className="text-amber-400 text-xs">?</span>}
                    {ings.length>1&&<button onClick={()=>remIng(ing.id)} className="text-gray-300 hover:text-red-400 text-lg leading-none">×</button>}
                  </div>
                ))}
              </div>
              {!isCommercial&&ingSum>0&&<div className="text-xs text-gray-400 mt-1.5 text-right">{t(lang,'ingTotal2')}: {ingSum}g</div>}
            </div>

            {/* 제조량·섭취량 (홈메이드만) */}
            {!isCommercial&&(
              <div className="bg-[#FFF8F0] border border-[#FFE4D2] rounded-xl p-3">
                <div className="text-xs font-semibold text-[#C4703D] mb-2">🍳 {t(lang,'totalMade')} · {t(lang,'totalEaten')}</div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <div className="flex items-center justify-between mb-1">
                      <label className="text-xs text-gray-600">{t(lang,'totalMade')}</label>
                      {ingSum>0&&<button onClick={autoFillMade} className="text-xs text-[#E68A58] font-medium">{t(lang,'refRatio')}({ingSum}g)</button>}
                    </div>
                    <input type="number" placeholder="0" value={totalMade}
                      onChange={e=>setTotalMade(e.target.value)}
                      className="w-full border border-[#FFE4D2] rounded-xl px-3 py-2 text-sm text-center bg-white" min="0"/>
                  </div>
                  <div>
                    <div className="flex items-center justify-between mb-1">
                      <label className="text-xs text-gray-600">{t(lang,'totalEaten')}</label>
                      {madeN>0&&<button onClick={fullMeal} className="text-xs font-semibold px-2 py-0.5 rounded-full border"
                        style={{borderColor:'#5E8C78',color:'#5E8C78',background:'#E8F0EC'}}>
                        🍚 {t(lang,'fullMealBtn')}
                      </button>}
                    </div>
                    <input type="number" placeholder="0" value={totalEaten}
                      onChange={e=>setTotalEaten(e.target.value)}
                      className={`w-full border rounded-xl px-3 py-2 text-sm text-center bg-white ${eatPct!==null&&eatPct<50?'border-[#E68A58]':eatPct===100?'border-[#99B7A4]':'border-[#FFE4D2]'}`} min="0"/>
                  </div>
                </div>
                {eatPct!==null&&madeN>0&&(
                  <div className="mt-2 text-center text-sm font-semibold" style={{color:eatPct<50?'#C4703D':eatPct<80?'#818546':'#5E8C78'}}>
                    {t(lang,'eatRate')} {eatPct}% ({eatenN}g / {madeN}g)
                    {eatPct===100&&` ✓ ${t(lang,'fullEat')}`}{eatPct<50&&` — ${t(lang,'halfLeft')}`}
                  </div>
                )}
                <p className="text-xs text-[#C4703D] mt-2">💡 {t(lang,'eatHint')}</p>
              </div>
            )}

            {/* 메모 */}
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1.5">{t(lang,'memo')}</label>
              <textarea value={memo} onChange={e=>setMemo(e.target.value)}
                placeholder={t(lang,'memoPlaceholder')}
                className="border border-gray-200 rounded-xl px-3 py-2 w-full text-sm resize-none" rows={2}/>
            </div>
          </div>
          <div className="flex gap-3 mt-5">
            <button onClick={onClose} className="flex-1 py-3 rounded-xl border-2 border-gray-200 text-gray-500 font-semibold">{t(lang,'cancel')}</button>
            <button onClick={handleSave} className="flex-1 py-3 rounded-xl font-semibold text-white"
              style={{background:'linear-gradient(135deg,#E68A58,#C4703D)'}}>{t(lang,'saveBtn')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── 식사 카드 ──────────────────────────────────────────────────────────────────
function MealCard({meal,onEdit,onDelete,onToggleLiked,liked,allergy,onIngLike,onIngAllergy,lang='ko'}){
  const[exp,setExp]=useState(false);
  const mac=useMemo(()=>calcMacros([meal]),[meal]);
  const madeN=meal.totalMadeGrams||0, eatN=meal.totalEatenGrams||0;
  const eatPct=madeN>0?Math.round(eatN/madeN*100):null;
  return(
    <div className="rounded-xl border-2 p-3 mb-2.5 slide-in" style={{borderColor:MEAL_BG[meal.type],background:MEAL_BG[meal.type]+'50'}}>
      <div className="flex items-center justify-between">

// ── 재료 목록 ─────────────────────────────────────────────────────────────────
function IngsView({meals,liked,allergy,onLike,onAllergy,lang='ko'}){
  const[search,setSearch]=useState('');
  const stats=useMemo(()=>{
    const s={};
    Object.entries(meals).forEach(([date,dm])=>dm.forEach(m=>{
      const ingSum=m.ingredients.reduce((ss,i)=>ss+Number(i.grams||0),0);
      const made=m.totalMadeGrams>0?m.totalMadeGrams:ingSum;
      const eaten=m.totalEatenGrams>0?m.totalEatenGrams:made;
      const ratio=made>0?eaten/made:1;
      // 시판 원재료도 포함
      const allIngs=[
        ...m.ingredients,
        ...((m.commercialIngredients||[]).map(n=>({name:n,grams:0,isCommercialOnly:true})))
      ];
      allIngs.forEach(ing=>{
        if(!ing.name?.trim())return;
        const eG=Number(ing.grams||0)*ratio;
        if(!s[ing.name])s[ing.name]={count:0,totalG:0,firstDate:date,commercialCount:0,homemadeCount:0};
        s[ing.name].count++;s[ing.name].totalG+=eG;
        if(m.isCommercial)s[ing.name].commercialCount++;
        else s[ing.name].homemadeCount++;
      });
    }));
    return s;
  },[meals]);
  const filtered=Object.entries(stats).filter(([n])=>n.includes(search)).sort((a,b)=>b[1].count-a[1].count);
  return(
    <div className="bg-white rounded-2xl shadow-sm p-4">
      <h2 className="font-bold text-gray-800 mb-3">{t(lang,'allIngs')}</h2>
      <input type="text" placeholder={t(lang,'ingSearch')} value={search} onChange={e=>setSearch(e.target.value)}
        className="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm mb-3"/>
      <div className="text-xs text-gray-400 mb-3">{filtered.length} {t(lang,'ingCount')}</div>
      {filtered.length===0?<div className="text-center py-8 text-gray-300 text-sm">{t(lang,'noRecordDay')}</div>:(
        <div className="space-y-2">
          {filtered.map(([name,st])=>(
            <div key={name} className={`flex items-center gap-3 p-3 rounded-xl border ${allergy.includes(name)?'border-red-200 bg-red-50':'border-gray-100 hover:bg-gray-50'}`}>
              <div className="flex-1">
                <div className="flex items-center gap-1.5 flex-wrap">
                  <span className="font-medium text-gray-700 text-sm">{name}</span>
                  {allergy.includes(name)&&<span className="text-xs bg-red-100 text-red-600 px-1.5 py-0.5 rounded-full">⚠️ {t(lang,'allergyWarning')}</span>}
                  {st.commercialCount>0&&st.homemadeCount===0&&<span className="text-xs bg-[#DBEAF5] text-[#2A6280] px-1.5 py-0.5 rounded-full">🏪 {t(lang,'commercialTag')}</span>}
                  {!lookupM(name)&&st.homemadeCount>0&&<span className="text-xs bg-[#FFF0E6] text-[#E68A58] px-1.5 py-0.5 rounded-full">{t(lang,'ingNotInDB')}</span>}
                </div>
                <div className="text-xs text-gray-400 mt-0.5">{st.count}{t(lang,'ingTimes')} · {t(lang,'ingTotal')} {Math.round(st.totalG)}g · {t(lang,'ingFirst')}: {st.firstDate}</div>
              </div>
              <button onClick={()=>onLike(name)} className={`text-xl hover:scale-110 transition-transform ${liked.includes(name)?'text-yellow-400':'text-gray-200'}`}>★</button>
              <button onClick={()=>onAllergy(name)} className={`text-xs px-2 py-1 rounded-full border ${allergy.includes(name)?'border-red-300 text-red-500':'border-gray-200 text-gray-400'}`}>⚠</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// 미량영양소 DRI 커버리지 바

function MicroBar({label,val,dri,unit}){
  const pct=dri>0?Math.min(val/dri*100,150):0;
  const displayPct=Math.min(pct,100);
  const over=pct>100, low=pct<25;
  const color=over?'#C4703D':low?'#9BC0CC':'#6BAE83';
  return(
    <div className="flex items-center gap-2">
      <span className="text-xs text-gray-500 flex-shrink-0" style={{width:52}}>{label}</span>
      <div className="flex-1 relative h-2 bg-gray-100 rounded-full overflow-hidden">
        <div className="absolute top-0 left-0 h-full rounded-full" style={{width:`${displayPct}%`,background:color}}/>
      </div>
      <span className="text-xs font-semibold flex-shrink-0" style={{width:36,textAlign:'right',color}}>{Math.round(pct)}%</span>
      {over&&<span className="text-xs flex-shrink-0" style={{color:'#C4703D'}}>↑</span>}
      {low&&<span className="text-xs flex-shrink-0" style={{color:'#9BC0CC'}}>↓</span>}
      {!over&&!low&&<span className="text-xs flex-shrink-0" style={{color:'#6BAE83'}}>✓</span>}
    </div>
  );
}

function IngDetailCard({name,lang='ko'}){
  const macro=lookupM(name);
  const micro=MICRO_DB[name]||(()=>{for(const[k,v]of Object.entries(MICRO_DB)){if(name.includes(k)||k.includes(name))return v;}return null;})();
  if(!macro&&!micro)return(
    <div className="bg-gray-50 rounded-xl p-4 text-center text-gray-400 text-sm">
      <div className="text-2xl mb-1">🔍</div>"{name}" {t(lang,'noIngInfo')}<br/>
      <span className="text-xs">{t(lang,'noIngSub')}</span>
    </div>
  );
  const kcal=macro?(macro.c*4+macro.p*4+macro.f*9):0;
  return(
    <div className="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden slide-in">
      <div className="px-4 py-3 flex items-start justify-between" style={{background:'linear-gradient(135deg,#FFF0E6,#FFE4D2)'}}>
        <div>
          <div className="font-bold text-gray-800 text-base">{name}</div>
          {micro?.intro&&<div className="text-xs text-[#C4703D] mt-0.5">{t(lang,'introTime')}: {micro.intro}</div>}
          {micro?.tags&&(
            <div className="flex flex-wrap gap-1 mt-1.5">
              {micro.tags.map(tg=>(
                <span key={tg} className="text-xs bg-white border border-[#FFE4D2] text-[#884529] px-2 py-0.5 rounded-full">{tg}</span>
              ))}
            </div>
          )}
        </div>
        {kcal>0&&<div className="text-right flex-shrink-0 ml-3">
          <div className="text-xl font-black" style={{color:'#E68A58'}}>{Math.round(kcal)}</div>
          <div className="text-xs text-gray-400">kcal/100g</div>
        </div>}
      </div>
      <div className="p-4 space-y-3">
        {/* 탄단지 */}
        {macro&&(
          <div>
            <div className="text-xs font-semibold text-gray-500 mb-2">{t(lang,'macro100g')}</div>
            <div className="grid grid-cols-3 gap-2 text-center">
              {[[t(lang,'macros').carbs,macro.c,'#FB923C'],[t(lang,'macros').protein,macro.p,'#34D399'],[t(lang,'macros').fat,macro.f,'#60A5FA']].map(([l,v,c])=>(
                <div key={l} className="rounded-lg py-2 px-1" style={{background:c+'18'}}>
                  <div className="text-sm font-black" style={{color:c}}>{v}g</div>
                  <div className="text-xs text-gray-500 mt-0.5">{l}</div>
                </div>
              ))}
            </div>
          </div>
        )}
        {/* 미량영양소 */}
        {micro&&(
          <div>
            <div className="text-xs font-semibold text-gray-500 mb-2">{t(lang,'microDri')}</div>
            <div className="space-y-2">
              {Object.entries(DRI_6_12).map(([k,d])=>{
                const v=micro[k]||0;
                if(v===0)return null;
                return<MicroBar key={k} label={d.label} val={v} dri={d.val} unit={d.unit} desc=""/>;
              })}
            </div>
          </div>
        )}
        {/* 아기 메모 */}
        {micro?.note&&(
          <div className="bg-[#DBEAF5] rounded-xl px-3 py-2.5 border border-[#9BC0CC]">
            <div className="text-xs font-semibold text-[#2A6280] mb-0.5">💡 {t(lang,'tipTitle')}</div>
            <p className="text-xs text-[#4482A3] leading-relaxed">{micro.note}</p>
          </div>
        )}
        <div className="text-xs text-gray-300 text-right">{t(lang,'tipSrc')}</div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// 🧪 영양 미리보기 뷰
// ══════════════════════════════════════════════════════════════════════════════
function PreviewView({birthDate,allergy,lang='ko'}){
  const[tab,setTab]=useState('sim');
  const[simIngs,setSimIngs]=useState([{id:genId(),name:'',grams:''}]);
  const addSimIng=()=>setSimIngs(p=>[...p,{id:genId(),name:'',grams:''}]);
  const remSimIng=id=>setSimIngs(p=>p.filter(i=>i.id!==id));
  const updSimIng=(id,f,v)=>setSimIngs(p=>p.map(i=>i.id===id?{...i,[f]:v}:i));
  const ingSum=simIngs.reduce((s,i)=>s+(Number(i.grams)||0),0);
  const validIngs=simIngs.filter(i=>i.name.trim()&&Number(i.grams)>0);

  const simMealObj=useMemo(()=>[{
    ingredients:validIngs.map(i=>({...i,grams:Number(i.grams)})),
    totalMadeGrams:0, totalEatenGrams:0,
  }],[validIngs]);

  const macros=useMemo(()=>calcMacros(simMealObj),[simMealObj]);
  const micro=useMemo(()=>calcMicro(validIngs,1),[validIngs]);
  const rec=useMemo(()=>getRec(birthDate),[birthDate]);

  const score=useMemo(()=>{
    if(macros.totalKcal<1)return null;
    let ok=0,total=0;
    const chk=(v,mn,mx)=>{total++;if(v>=mn&&v<=mx)ok++;};
    chk(macros.carbsPct,rec.carbs.min,rec.carbs.max);
    chk(macros.proteinPct,rec.protein.min,rec.protein.max);
    chk(macros.fatPct,rec.fat.min,rec.fat.max);
    if(micro.iron/DRI_6_12.iron.val>=0.25){total++;ok++;}
    if(micro.calcium/DRI_6_12.calcium.val>=0.15){total++;ok++;}
    const p=ok/total*100;
    // 팔레트 색상 사용
    const L=lang==='en';
    if(p>=80)return{grade:'S',label:L?'Ideal combo!':'이상적인 조합!',color:'#5E8C78',bg:'#E8F0EC',border:'#99B7A4',stars:5};
    if(p>=60)return{grade:'A',label:L?'Well balanced':'균형 잡힌 조합',color:'#4482A3',bg:'#DBEAF5',border:'#9BC0CC',stars:4};
    if(p>=40)return{grade:'B',label:L?'Basic combo':'기본 조합',      color:'#C4703D',bg:'#FFF0E6',border:'#E68A58',stars:3};
    return{grade:'C',label:L?'Needs adjustment':'조정이 필요해요',    color:'#884529',bg:'#F5ECE6',border:'#C4A090',stars:2};
  },[macros,micro,rec]);

  // 구체적 개선 제안
  const suggestions=useMemo(()=>{
    if(macros.totalKcal<1)return[];
    const s=[];
    const E=lang==='en';
    if(macros.carbsPct<rec.carbs.min) s.push({type:'low',text:E?`Carbs low (${Math.round(macros.carbsPct)}%). Try adding rice porridge, sweet potato, or pumpkin.`:`탄수화물 부족 (${Math.round(macros.carbsPct)}%). 쌀죽·고구마·단호박을 추가해보세요.`});
    if(macros.carbsPct>rec.carbs.max) s.push({type:'high',text:E?`Carbs high (${Math.round(macros.carbsPct)}%). Increase vegetables or protein ratio.`:`탄수화물 과잉 (${Math.round(macros.carbsPct)}%). 채소·단백질 비중을 늘려보세요.`});
    if(macros.proteinPct<rec.protein.min) s.push({type:'low',text:E?`Protein low (${Math.round(macros.proteinPct)}%). Try beef, tofu, or egg yolk.`:`단백질 부족 (${Math.round(macros.proteinPct)}%). 소고기·두부·달걀노른자를 추가해보세요.`});
    if(macros.proteinPct>rec.protein.max) s.push({type:'high',text:E?`Protein high (${Math.round(macros.proteinPct)}%). Reduce proportion to ease kidney load.`:`단백질 과잉 (${Math.round(macros.proteinPct)}%). 신장 부담을 줄이기 위해 비중을 낮춰주세요.`});
    if(macros.fatPct<rec.fat.min) s.push({type:'low',text:E?`Fat low (${Math.round(macros.fatPct)}%). Try avocado, egg yolk, or soft tofu.`:`지방 부족 (${Math.round(macros.fatPct)}%). 아보카도·달걀노른자·연두부로 건강한 지방을 보충하세요.`});
    if(macros.fatPct>rec.fat.max) s.push({type:'high',text:E?`Fat high (${Math.round(macros.fatPct)}%). Reduce cooking oil or choose lower-fat ingredients.`:`지방 과잉 (${Math.round(macros.fatPct)}%). 조리 시 기름을 줄이거나 저지방 재료를 선택하세요.`});
    if(micro.iron/DRI_6_12.iron.val<0.15&&validIngs.length>0)
      s.push({type:'micro',text:E?`Iron at ${Math.round(micro.iron/DRI_6_12.iron.val*100)}% of DRI. Consider beef, lentils, or spinach.`:`철분이 DRI의 ${Math.round(micro.iron/DRI_6_12.iron.val*100)}%로 낮아요. 소고기·렌틸콩·시금치 추가를 권장합니다.`});
    if(micro.vitA/DRI_6_12.vitA.val<0.15&&validIngs.length>0)
      s.push({type:'micro',text:E?'Vitamin A low. Try carrot, sweet potato, or pumpkin.':'비타민A가 부족해요. 당근·고구마·단호박을 추가해보세요.'});
    return s;
  },[macros,micro,rec,validIngs]);

  // ── 검색 상태 ──
  const[searchQ,setSearchQ]=useState('');
  const[selectedIng,setSelectedIng]=useState(null);
  const allIngNames=[...new Set([...Object.keys(MDB),...Object.keys(MICRO_DB)])].sort();
  const searchResults=searchQ.trim().length>0
    ?allIngNames.filter(n=>n.includes(searchQ.trim()))
    :[];

  return(
    <div className="space-y-4">
      {/* 탭 헤더 */}
      <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div className="px-5 py-4 flex items-center gap-3" style={{background:'linear-gradient(135deg,#818546,#5E6A2E)'}}>
          <span className="text-2xl">🧪</span>
          <div>
            <div className="font-bold text-base" style={{color:'#FFE4D2'}}>{t(lang,'simTitle')}</div>
            <div className="text-xs mt-0.5" style={{color:'#C8C898'}}>{t(lang,'simSub')}</div>
          </div>
        </div>
        <div className="flex border-b border-[#FFE4D2]">
          {[['sim',t(lang,'simTab')],['search',t(lang,'searchTab')]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)}
              className={`flex-1 py-3 text-sm font-semibold transition-all ${tab===id?'border-b-2 border-[#818546] text-[#818546] bg-[#EFF0E0]':'text-gray-500 hover:bg-[#FFF8F0]'}`}>
              {lbl}
            </button>
          ))}
        </div>
      </div>

      {/* ─── 조합 시뮬레이터 ─── */}
      {tab==='sim'&&(
        <div className="space-y-4">

          {/* ① 재료 입력 */}
          <div className="bg-white rounded-2xl shadow-sm p-5">
            <div className="sec-title">{t(lang,'ingInputTitle')}
              <button onClick={addSimIng} className="ml-auto text-xs font-semibold px-3 py-1 rounded-full border"
                style={{background:'#EFF0E0',color:'#818546',borderColor:'#C8C870'}}>{t(lang,'addIng')}</button>
            </div>
            <datalist id="ing-list">
              {allIngNames.map(n=><option key={n} value={n}/>)}
            </datalist>
            <div className="space-y-2">
              {simIngs.map(ing=>{
                const hasInfo=!!(lookupM(ing.name)||MICRO_DB[ing.name]);
                const isAllergy=allergy.includes(ing.name);
                return(
                  <div key={ing.id} className="flex gap-2 items-center">
                    <div className="flex-1 relative">
                      <input type="text" list="ing-list" placeholder={lang==='en'?'Ingredient (e.g. beef, carrot)':'재료명 (예: 소고기, 당근)'} value={ing.name}
                        onChange={e=>updSimIng(ing.id,'name',e.target.value)}
                        className={`w-full border rounded-xl px-3 py-2 text-sm ${isAllergy?'border-[#884529] bg-[#F5ECE6]':hasInfo&&ing.name?'border-[#818546] bg-[#EFF0E0]':'border-gray-200'}`}/>
                      {ing.name&&<span className={`absolute right-2.5 top-1/2 -translate-y-1/2 text-xs font-bold ${hasInfo?'text-[#818546]':'text-[#E68A58]'}`}>{hasInfo?'✓':'?'}</span>}
                    </div>
                    <input type="number" placeholder="g" value={ing.grams}
                      onChange={e=>updSimIng(ing.id,'grams',e.target.value)}
                      className="w-20 border border-[#FFE4D2] rounded-xl px-2 py-2 text-sm text-center" min="0"/>
                    {simIngs.length>1&&<button onClick={()=>remSimIng(ing.id)} className="text-gray-300 hover:text-[#884529] text-lg leading-none">×</button>}
                  </div>
                );
              })}
            </div>
            {ingSum>0&&<div className="text-right text-xs mt-2" style={{color:'#884529'}}>{t(lang,'ingTotal2')}: <strong>{ingSum}g</strong></div>}
            <p className="text-xs mt-2" style={{color:'#99B7A4'}}>{t(lang,'ingTip')}</p>
          </div>

          {/* ② 종합 점수 — 최상단에 배치 */}
          {score&&(
            <div className="rounded-2xl border-2 p-5 slide-in" style={{background:score.bg,borderColor:score.border}}>
              <div className="text-xs font-semibold mb-3 uppercase tracking-wide" style={{color:score.color}}>{t(lang,'scoreTitle')}</div>
              <div className="flex items-center gap-4">
                <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl font-black flex-shrink-0"
                  style={{background:score.color,color:'#FFF4ED'}}>{score.grade}</div>
                <div className="flex-1">
                  <div className="font-black text-xl leading-tight" style={{color:score.color}}>{score.label}</div>
                  <div className="flex gap-0.5 mt-1">
                    {Array.from({length:5}).map((_,i)=>(
                      <span key={i} className="text-xl" style={{color:i<score.stars?'#E68A58':'#E0D8CC'}}>★</span>
                    ))}
                  </div>
                  <div className="text-xs mt-1" style={{color:score.color+'CC'}}>{rec.age} {t(lang,'appliedAge')}</div>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="text-3xl font-black" style={{color:score.color}}>{Math.round(macros.totalKcal)}</div>
                  <div className="text-xs text-gray-400">kcal</div>
                </div>
              </div>
            </div>
          )}

          {/* 결과 없을 때 */}
          {!score&&(
            <div className="bg-white rounded-2xl shadow-sm py-14 text-center" style={{color:'#C4A090'}}>
              <div className="text-5xl mb-3">🥣</div>
              <div className="text-sm font-medium" style={{whiteSpace:'pre-line'}}>{t(lang,'macroHint')}</div>
            </div>
          )}

          {/* ③ 탄단지 + 미량영양소 */}
          {macros.totalKcal>0&&(
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-white rounded-2xl shadow-sm p-5">
                <div className="sec-title">{t(lang,'macroSection')} <span className="text-xs font-normal text-gray-400">{lang==='en'?'(energy %)':'(에너지 기준)'}</span></div>
                <div className="flex justify-center mb-4"><Donut macros={macros} size={140}/></div>
                <MacroCard macroKey="carbs"   actual={macros.carbsPct}   rec={rec.carbs}   grams={macros.carbsG}   kcal={macros.carbsKcal}   lang={lang}/>
                <MacroCard macroKey="protein" actual={macros.proteinPct} rec={rec.protein} grams={macros.proteinG} kcal={macros.proteinKcal} lang={lang}/>
                <MacroCard macroKey="fat"     actual={macros.fatPct}     rec={rec.fat}     grams={macros.fatG}     kcal={macros.fatKcal}     lang={lang}/>
              </div>
              <div className="bg-white rounded-2xl shadow-sm p-5">
                <div className="sec-title">{t(lang,'microSection')} <span className="text-xs font-normal text-gray-400">(DRI %)</span></div>
                <div className="space-y-2.5">
                  {Object.entries(DRI_6_12).map(([k,d])=>(
                    <MicroBar key={k} label={d.label} val={micro[k]||0} dri={d.val} unit={d.unit} desc=""/>
                  ))}
                </div>
                {micro.missing?.length>0&&(
                  <div className="mt-3 text-xs rounded-xl px-3 py-2" style={{background:'#FFF0E6',color:'#884529'}}>
                    ⚠️ {t(lang,'missingDB')}: {micro.missing.join(', ')}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ④ 개선 제안 */}
          {suggestions.length>0&&(
            <div className="bg-white rounded-2xl shadow-sm p-5">
              <div className="sec-title">{t(lang,'suggestions')}</div>
              <div className="space-y-2">
                {suggestions.map((s,i)=>(
                  <div key={i} className="flex gap-2.5 items-start rounded-xl px-3 py-2.5 text-sm"
                    style={s.type==='high'?{background:'#F5ECE6',color:'#884529'}:s.type==='low'?{background:'#FFF0E6',color:'#C4703D'}:{background:'#DBEAF5',color:'#2A6280'}}>
                    <span className="flex-shrink-0 mt-0.5 font-bold">{s.type==='high'?'↑':s.type==='low'?'↓':'💊'}</span>
                    <span>{s.text}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          {suggestions.length===0&&score&&score.grade==='S'&&(
            <div className="rounded-2xl p-4 text-center border-2" style={{background:'#E8F0EC',borderColor:'#99B7A4'}}>
              <div className="text-3xl mb-1">🎉</div>
              <div className="font-bold" style={{color:'#5E8C78'}}>{t(lang,'perfectCombo')}</div>
              <div className="text-xs mt-1" style={{color:'#5E8C78'}}>{t(lang,'perfectSub')}</div>
            </div>
          )}

          {/* 출처 */}
          {macros.totalKcal>0&&(
            <div className="rounded-xl px-4 py-3 text-xs border" style={{background:'#DBEAF5',borderColor:'#9BC0CC',color:'#2A6280'}}>
              📋 <strong>{rec.age}</strong> {t(lang,'appliedAge')} · {rec.src} · {t(lang,'notMedical')}
            </div>
          )}
        </div>
      )}

      {/* ─── 재료 성분 검색 ─── */}
      {tab==='search'&&(
        <div className="space-y-4">
          <div className="bg-white rounded-2xl shadow-sm p-5">
            <div className="sec-title">{t(lang,'searchTab')}</div>
            <div className="relative mb-1">
              <input type="text" placeholder={t(lang,'searchPlaceholder')} value={searchQ}
                onChange={e=>{setSearchQ(e.target.value);setSelectedIng(null);}}
                className="w-full border rounded-xl pl-4 pr-10 py-2.5 text-sm" style={{borderColor:'#C8C870'}}/>
              {searchQ&&<button onClick={()=>{setSearchQ('');setSelectedIng(null);}} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">×</button>}
            </div>
            <p className="text-xs mt-1" style={{color:'#99B7A4'}}>{t(lang,'tipSrc')}</p>
            {searchResults.length>0&&!selectedIng&&(
              <div className="mt-2 max-h-48 overflow-y-auto rounded-xl border border-[#FFE4D2] divide-y divide-[#FFE4D2]">
                {searchResults.slice(0,15).map(n=>{
                  const m=MICRO_DB[n];
                  return(
                    <button key={n} onClick={()=>{setSelectedIng(n);setSearchQ(n);}}
                      className="w-full text-left px-4 py-2.5 hover:bg-[#FFF0E6] transition-colors flex items-center gap-2">
                      <span className="text-sm font-medium" style={{color:'#884529'}}>{n}</span>
                      {m?.intro&&<span className="text-xs px-2 py-0.5 rounded-full" style={{background:'#FFE4D2',color:'#884529'}}>{m.intro}</span>}
                      {m?.tags?.slice(0,2).map(t=><span key={t} className="text-xs px-2 py-0.5 rounded-full" style={{background:'#EFF0E0',color:'#818546'}}>{t}</span>)}
                    </button>
                  );
                })}
                {searchResults.length>15&&<div className="px-4 py-2 text-xs text-gray-400 text-center">... 외 {searchResults.length-15}개</div>}
              </div>
            )}
            {searchQ.trim()&&searchResults.length===0&&(
              <div className="mt-2 text-center py-6 text-sm" style={{color:'#C4A090'}}>"{searchQ}"에 해당하는 재료가 없어요</div>
            )}
          </div>
          {selectedIng&&<IngDetailCard name={selectedIng} lang={lang}/>}
          {!selectedIng&&!searchQ&&(
            <div className="bg-white rounded-2xl shadow-sm p-5">
              <div className="sec-title">{t(lang,'tipTitle')}</div>
              {[
                {label:'🩸 철분 풍부',     items:['소고기','렌틸콩','시금치','오트밀','완두콩'],   bg:'#F5ECE6',tc:'#884529'},
                {label:'🟠 비타민A 풍부',  items:['고구마','당근','단호박','시금치'],              bg:'#FFF0E6',tc:'#C4703D'},
                {label:'🌿 비타민C 풍부',  items:['브로콜리','딸기','파프리카','키위'],            bg:'#E8F0EC',tc:'#5E8C78'},
                {label:'🦴 칼슘 풍부',     items:['연두부','두부','플레인요거트','브로콜리'],      bg:'#DBEAF5',tc:'#4482A3'},
                {label:'🥑 건강한 지방',   items:['아보카도','달걀노른자'],                        bg:'#EFF0E0',tc:'#818546'},
              ].map(g=>(
                <div key={g.label} className="mb-4">
                  <div className="text-xs font-bold mb-2" style={{color:g.tc}}>{g.label}</div>
                  <div className="flex flex-wrap gap-1.5">
                    {g.items.map(it=>(
                      <button key={it} onClick={()=>{setSelectedIng(it);setSearchQ(it);}}
                        className="text-xs px-3 py-1.5 rounded-full font-medium hover:opacity-80 transition-opacity border"
                        style={{background:g.bg,color:g.tc,borderColor:g.tc+'50'}}>{it}</button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── 헤더 ──────────────────────────────────────────────────────────────────────
function Header({view,setView,babyName,birthDate,lang,setLang}){
  const nav=t(lang,'nav');
  const navs=[
    {id:'calendar',l:nav.calendar},{id:'nutrition',l:nav.nutrition},
    {id:'preview',l:nav.preview},{id:'recommend',l:nav.recommend},
    {id:'ingredients',l:nav.ingredients},{id:'settings',l:nav.settings},
  ];
  return(
    <header className="bg-white shadow-sm sticky top-0 z-30">
      <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
        <div className="flex items-center gap-3">
          <span className="text-2xl">🍼</span>
          <div>
            <div className="font-bold text-lg leading-tight" style={{color:'#884529'}}>{babyName}{t(lang,'diaryTitle')}</div>
            <div className="text-xs font-medium" style={{color:'#E68A58'}}>{calcAge(birthDate,lang)}</div>
          </div>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          <nav className="flex gap-1 flex-wrap">
            {navs.map(n=>(
              <button key={n.id} onClick={()=>setView(n.id)}
                className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all ${view===n.id?'tab-on':'tab-off hover:bg-gray-50'}`}>{n.l}</button>
            ))}
          </nav>
          <button onClick={()=>setLang(l=>l==='ko'?'en':'ko')}
            className="px-3 py-1.5 rounded-full text-xs font-semibold border-2 transition-all"
            style={{borderColor:'#E68A58',color:'#E68A58',background:'white'}}>
            {t(lang,'langBtn')}
          </button>
        </div>
      </div>
    </header>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// App
// ══════════════════════════════════════════════════════════════════════════════
function App(){
  const[view,setView]=useState('calendar');
  const[lang,setLang]=useLS('babyDiet_lang','ko');
  const[meals,setMeals]=useLS('babyDiet_meals',{});
  const[liked,setLiked]=useLS('babyDiet_liked',[]);
  const[allergy,setAllergy]=useLS('babyDiet_allergy',[]);
  const[babyName,setBabyName]=useLS('babyDiet_name','아기');
  const[birthDate,setBirthDate]=useLS('babyDiet_birth',BABY_BIRTH);
  const[selectedDate,setSelectedDate]=useState(today());
  const[currentMonth,setCurrentMonth]=useState(new Date());
  const[showForm,setShowForm]=useState(false);
  const[editMeal,setEditMeal]=useState(null);

  const saveMeal=useCallback((meal,date)=>{
    const target=date||selectedDate;
    setMeals(p=>{
      const dm=p[target]||[];
      const ex=dm.find(m=>m.id===meal.id);
      return{...p,[target]:ex?dm.map(m=>m.id===meal.id?meal:m):[...dm,meal]};
    });
    setShowForm(false);setEditMeal(null);
  },[selectedDate,setMeals]);

  const deleteMeal=useCallback((id)=>{
    if(!confirm(lang==='en'?'Delete this meal?':'삭제할까요?'))return;
    setMeals(p=>({...p,[selectedDate]:(p[selectedDate]||[]).filter(m=>m.id!==id)}));
  },[selectedDate,setMeals,lang]);

  // 좋아요 토글 시 해당 식단의 재료를 liked에 자동 추가
  const toggleMealLiked=useCallback((id)=>{
    setMeals(p=>{
      const dm=p[selectedDate]||[];
      const meal=dm.find(m=>m.id===id);
      const nowLiked=meal?!meal.liked:false;
      if(nowLiked&&meal){
        setLiked(prev=>{
          const newOnes=meal.ingredients.map(i=>i.name).filter(n=>n&&!prev.includes(n));
          return newOnes.length>0?[...prev,...newOnes]:prev;
        });
      }
      return{...p,[selectedDate]:dm.map(m=>m.id===id?{...m,liked:!m.liked}:m)};
    });
  },[selectedDate,setMeals,setLiked]);

  const togIngLike=useCallback(n=>setLiked(p=>p.includes(n)?p.filter(i=>i!==n):[...p,n]),[setLiked]);
  const togIngAllergy=useCallback(n=>setAllergy(p=>p.includes(n)?p.filter(i=>i!==n):[...p,n]),[setAllergy]);

  return(
    <div className="min-h-screen" style={{background:'#FFF8F0'}}>
      <Header view={view} setView={setView} babyName={babyName} birthDate={birthDate} lang={lang} setLang={setLang}/>
      <main className="max-w-5xl mx-auto px-4 py-5">
        {view==='calendar'&&(
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div>
              <CalView meals={meals} selectedDate={selectedDate} setSelectedDate={setSelectedDate}
                currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} birthDate={birthDate} lang={lang}/>
              <div className="mt-4 bg-white rounded-2xl shadow-sm p-4">
                <h3 className="font-bold text-gray-700 mb-2 text-sm">📅 {t(lang,'monthSummary')}</h3>
                {(()=>{
                  const y=currentMonth.getFullYear(),m=currentMonth.getMonth(),d=getDays(y,m);
                  let lg=0,tot=0,ings=new Set();
                  for(let i=1;i<=d;i++){const k=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;const dm=meals[k]||[];if(dm.length)lg++;tot+=dm.length;dm.forEach(meal=>meal.ingredients.forEach(i=>ings.add(i.name)));}
                  return(
                    <div className="grid grid-cols-3 gap-2 text-center">
                      <div className="bg-[#FFF0E6] rounded-xl p-2.5"><div className="text-xl font-black text-[#E68A58]">{lg}</div><div className="text-xs text-gray-400">{t(lang,'recordedDays')}</div></div>
                      <div className="bg-orange-50 rounded-xl p-2.5"><div className="text-xl font-black text-orange-500">{tot}</div><div className="text-xs text-gray-400">{t(lang,'totalMeals')}</div></div>
                      <div className="bg-[#E8F0EC] rounded-xl p-2.5"><div className="text-xl font-black text-[#5E8C78]">{ings.size}</div><div className="text-xs text-gray-400">{t(lang,'ingTypes')}</div></div>
                    </div>
                  );
                })()}
              </div>
            </div>
            <DayPanel dateStr={selectedDate} meals={meals} liked={liked} allergy={allergy}
              onAdd={()=>{setEditMeal(null);setShowForm(true);}}
              onEdit={m=>{setEditMeal(m);setShowForm(true);}}
              onDelete={deleteMeal} onToggleMealLiked={toggleMealLiked}
              onIngLike={togIngLike} onIngAllergy={togIngAllergy} lang={lang}/>
          </div>
        )}
        {view==='nutrition'&&<NutritionView meals={meals} birthDate={birthDate} selectedDate={selectedDate} currentMonth={currentMonth} lang={lang}/>}
        {view==='preview'&&<PreviewView birthDate={birthDate} allergy={allergy} lang={lang}/>}
        {view==='recommend'&&<RecView meals={meals} liked={liked} allergy={allergy} birthDate={birthDate} lang={lang}/>}
        {view==='ingredients'&&<IngsView meals={meals} liked={liked} allergy={allergy} onLike={togIngLike} onAllergy={togIngAllergy} lang={lang}/>}
        {view==='settings'&&<Settings babyName={babyName} setBabyName={setBabyName} birthDate={birthDate} setBirthDate={setBirthDate} allergy={allergy} setAllergy={setAllergy} lang={lang}/>}
      </main>
      {showForm&&<MealModal editMeal={editMeal} onSave={saveMeal} onClose={()=>{setShowForm(false);setEditMeal(null);}} allergy={allergy} selectedDate={selectedDate} lang={lang}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
